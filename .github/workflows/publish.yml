name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to confirm manual publish to npm'
        required: true
        default: ""

permissions:
  contents: read

jobs:
  publish:
    if: github.event.inputs.confirm == 'publish'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Regenerate icon components from SVG sources
        run: npm run build:icons

      - name: Typecheck
        run: npm run typecheck --workspace=blitz-icons

      - name: Build package
        run: npm run build --workspace=blitz-icons

      - name: Publish package
        run: npm publish --workspace=blitz-icons
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
